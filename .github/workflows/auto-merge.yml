# merge main branch into previews branch

name: Auto merge
on:
  pull_request:
    branches: [master]
    types: [closed]
jobs:
  auto-merge:
    if: github.event.pull_request.merged == true
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Merge master into previews
        run: |
          git fetch --unshallow
          git checkout previews
          git pull
          git merge --no-ff master -m "Auto merge from main into previews"
          git push
