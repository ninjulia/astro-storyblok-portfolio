[build]
    command = "npm run build"
    publish = "dist"

[dev]
    command = "npm run dev"

[images]
    remote_images = ["https://a-us.storyblok.com/*"]

[context.previews]
    [[headers]]
        for = "/*"
        [headers.values]
            X-Robots-Tag = "noindex"

[context.production]
    [[headers]]
        for = "rss.xml"
        [headers.values]
            Content-Type = "application/xml"
            charset = "utf-8"
            x-content-type-options = "nosniff"